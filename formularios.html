<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="manifest" href="manifest.json">
    <link rel="icon" type="image/png" href="LogoUncos.png">
    <link rel="stylesheet" href="style.css">
    <meta name="theme-color" content="#0f5739">
    <title>Formularios|Gestionador de Mensajes</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, Helvetica, sans-serif;
        }

        body {
            background: linear-gradient(90deg, #0f5739, #3d8e66, #45c9a4, #46b5a9, #52c9eb);
            padding: 20px 10px;
        }

        h1 {
            color: white;
            text-align: center;
            margin-bottom: 25px;
            font-size: 2rem;
        }

        .p {
            color: white;
            font-size: 14px;
        }

        .form {
            background: rgba(255, 255, 255, .95);
            width: 100%;
            max-width: 560px;
            margin: 20px auto;
            padding: 20px;
            border-radius: 15px;
            box-shadow: 0 8px 20px rgba(0, 0, 0, .2);
        }

        fieldset {
            border: 1px solid #d6e8df;
            border-radius: 10px;
            padding: 15px;
        }

        legend {
            color: #0f5739;
            font-weight: bold;
            padding: 0 10px;
        }

        label {
            display: block;
            margin-top: 15px;
            margin-bottom: 6px;
            font-weight: bold;
            color: #20493b;
        }

        input {
            width: 100%;
            height: 48px;
            padding: 10px;
            font-size: 17px;
            border-radius: 8px;
            border: 1px solid #c7d9d1;
        }

        input:focus {
            outline: none;
            border-color: #1fe099;
            box-shadow: 0 0 0 3px rgba(31, 224, 153, .25);
        }

        .btn {
            width: 100%;
            height: 55px;
            margin-top: 25px;
            border: none;
            border-radius: 30px;
            cursor: pointer;
            font-size: 18px;
            font-weight: bold;
            background: linear-gradient(135deg, #00d4ff, #1fe099);
            transition: .3s;
        }

        .btn:hover {
            transform: scale(1.02);
        }

        #mensajeCopiado {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: #0f5739;
            color: white;
            padding: 12px 20px;
            border-radius: 25px;
            display: none;
            font-weight: bold;
        }

        .footer {
            background-color: #000000;
            width: 100%;
            height: auto;
            padding: 10px;
            text-align: center;
            margin-top: 20px;
        }
    </style>

</head>

<body>

    <h1>Gestionador de Mensajes</h1>

    <form id="form-conferenciante" class="form">

        <fieldset>

            <legend>Información Conferenciante</legend>

            <label for="nombre">Nombre y apellido Conferenciante:</label>
            <input type="text" id="nombre">


            <label for="titulo">Título Conferencia:</label>
            <input type="text" id="titulo">

            <label for="numero">Número Conferencia:</label>
            <input type="text" id="numero">

            <label for="titulo-Cantico">Título Cántico:</label>
            <input type="text" id="titulo-Cantico">

            <label for="numero-Cantico">Número Cántico:</label>
            <input type="text" id="numero-Cantico">

            <label for="nombre-Congregacion">Nombre Congregación Conferenciante:</label>
            <input type="text" id="nombre-Congregacion">

            <!-- <button type="button" class="btn" onclick="copiarFormulario('form-conferenciante')">
                📋 Copiar al Portapapeles
            </button> -->

        </fieldset>

    </form>


    <form id="form-mensaje" class="form">

        <fieldset>

            <legend>Información del Mensaje</legend>

            <label for="nom-Presidente" class="presidente">Nombre y Apellido Presidente:</label>
            <input type="text" id="nom-Presidente">

            <label for="oracion-Ini">Oración Inicial:</label>
            <input type="text" id="oracion-Ini">

            <label for="nom-Lector">Nombre y Apellido Lector:</label>
            <input type="text" id="nom-Lector">

            <label for="oracion-Fin">Oración Final:</label>
            <input type="text" id="oracion-Fin">

            <button type="button" class="btn" onclick="copiarFormulario('form-mensaje')">
                 Copiar al Portapapeles
            </button>

        </fieldset>
    </form>

    <button class="btn" onclick="window.location.href='index.html'">Volver al Inicio</button>
    <div id="mensajeCopiado">
         ¡Información copiada al portapapeles!
    </div>


    <footer class="footer">
        <p class="p">© 2026 Gestionador de Mensajes. Todos los derechos reservados. La Doble U.</p>
    </footer>




    <script>
        function copiarFormulario() {
            document.getElementById("nombre").value,
                document.getElementById("titulo").value,
                document.getElementById("numero").value,
                document.getElementById("titulo-Cantico").value,
                document.getElementById("numero-Cantico").value,
                document.getElementById("nombre-Congregacion").value,
                document.getElementById("nom-Presidente").value,
                document.getElementById("oracion-Ini").value,
                document.getElementById("nom-Lector").value,
                document.getElementById("oracion-Fin").value

            const texto = `Nombre y Apellido Conferenciante: ${document.getElementById("nombre").
            value}\nTítulo Conferencia: ${document.getElementById("titulo").
            value}\nNúmero Conferencia: ${document.getElementById("numero").
            value}\nTítulo Cántico: ${document.getElementById("titulo-Cantico").
            value}\nNúmero Cántico: ${document.getElementById("numero-Cantico").
            value}\nNombre Congregación Conferenciante: ${document.getElementById("nombre-Congregacion").
            value}\n\n
            "Información del Mensaje"\n
            Nombre y Apellido Presidente: ${document.getElementById("nom-Presidente").
            value}\nOración Inicial: ${document.getElementById("oracion-Ini").
            value}\nNombre y Apellido Lector: ${document.getElementById("nom-Lector").
            value}\nOración Final: ${document.getElementById("oracion-Fin").
            value}`;
            navigator.clipboard.writeText(texto);


            const mensajeCopiado = document.getElementById("mensajeCopiado");
            mensajeCopiado.style.display = "block";
        }


        if ("serviceWorker" in navigator) {

            navigator.serviceWorker.register("service-worker.js")
                .then(() => console.log("Service Worker registrado"))
                .catch(err => console.log(err));

        }

    </script>

</body>

</html>
